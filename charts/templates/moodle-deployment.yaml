apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
spec:
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      containers:
        - name: moodle
          image: {{.Values.moodle.image}}
          env:
            - name: SKIP_INSTALL
              value: 'false'
            - name: MOODLE_DATABASE_HOST
              value: mariadb
            - name: MOODLE_DATABASE_PORT_NUMBER
              value: '3306'
            - name: MOODLE_DATABASE_USER
              value: bn_moodle
            - name: MOODLE_DATABASE_NAME
              value: bitnami_moodle
            - name: MOODLE_DATABASE_PASSWORD
              value: ''
            - name: MOODLE_WWWROOT
              value: 'http://localhost:30080'
          ports:
            - containerPort: 80
          volumeMounts:
            - name: moodle-code
              mountPath: /var/www/moodle
            - name: moodle-data
              mountPath: /var/www/moodledata
      volumes:
        - name: moodle-code
          persistentVolumeClaim:
            claimName: moodle-code
        - name: moodle-data
          persistentVolumeClaim:
            claimName: moodle-data
