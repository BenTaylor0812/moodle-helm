apiVersion: v1
kind: Service
metadata:
  name: moodle
spec:
  type: NodePort
  selector:
    app: moodle
  ports:
    - name: http
      port: {{.Values.moodle.service.portHttp}}
      targetPort: {{.Values.moodle.service.portHttp}}
      nodePort: {{.Values.moodle.service.nodePortHttp}}
    - name: https
      port: {{.Values.moodle.service.portHttps}}
      nodePort: {{.Values.moodle.service.nodePortHttps}}
